<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RL Fashion - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .login-container {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .login-box {
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 20px;
      padding: 3rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.8),
        0 0 80px rgba(212, 175, 55, 0.05);
    }

    .logo-container {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-text {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: #d4af37;
      text-shadow: 0 0 40px rgba(212, 175, 55, 0.4);
      margin-bottom: 0.5rem;
    }

    .logo-subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.5em;
      color: rgba(212, 175, 55, 0.6);
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(212, 175, 55, 0.5);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .login-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #d4af37 0%, #b8962e 100%);
      border: none;
      border-radius: 10px;
      color: #0a0a0a;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.5rem;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .footer-text {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div class="login-container">
    <div class="login-box">
      <div class="logo-container">
        <div class="logo-text">RL</div>
        <div class="logo-subtitle">Fashion Production</div>
      </div>
      
      <form>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" placeholder="Enter your email">
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="Enter your password">
        </div>
        
        <button type="submit" class="login-btn">Sign In</button>
      </form>
      
      <p class="footer-text">CV RL Fashion • Premium Production System</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let particles = [];
    let lightStreaks = [];
    let time = 0;

    // Configuration
    const config = {
      particleCount: 80,
      lightStreakCount: 15,
      goldColor: { r: 212, g: 175, b: 55 },
      backgroundColor: '#0a0a0a'
    };

    // Resize handler
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    // Particle class for gold dust
    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.speedY = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.5 + 0.1;
        this.pulseSpeed = Math.random() * 0.02 + 0.01;
        this.pulseOffset = Math.random() * Math.PI * 2;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        // Subtle floating motion
        this.x += Math.sin(time * 0.001 + this.pulseOffset) * 0.1;
        this.y += Math.cos(time * 0.001 + this.pulseOffset) * 0.1;

        // Reset if out of bounds
        if (this.x < -50) this.x = width + 50;
        if (this.x > width + 50) this.x = -50;
        if (this.y < -50) this.y = height + 50;
        if (this.y > height + 50) this.y = -50;
      }

      draw() {
        const pulse = Math.sin(time * this.pulseSpeed + this.pulseOffset) * 0.3 + 0.7;
        const currentOpacity = this.opacity * pulse;

        ctx.beginPath();
        const gradient = ctx.createRadialGradient(
          this.x, this.y, 0,
          this.x, this.y, this.size * 3
        );
        gradient.addColorStop(0, `rgba(${config.goldColor.r}, ${config.goldColor.g}, ${config.goldColor.b}, ${currentOpacity})`);
        gradient.addColorStop(0.5, `rgba(${config.goldColor.r}, ${config.goldColor.g}, ${config.goldColor.b}, ${currentOpacity * 0.3})`);
        gradient.addColorStop(1, 'rgba(212, 175, 55, 0)');
        
        ctx.fillStyle = gradient;
        ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Light streak class for flowing lines
    class LightStreak {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.length = Math.random() * 200 + 100;
        this.speed = Math.random() * 0.5 + 0.2;
        this.angle = Math.random() * Math.PI * 2;
        this.opacity = Math.random() * 0.15 + 0.05;
        this.thickness = Math.random() * 1 + 0.5;
        this.waveAmplitude = Math.random() * 30 + 10;
        this.waveFrequency = Math.random() * 0.01 + 0.005;
        this.waveOffset = Math.random() * Math.PI * 2;
      }

      update() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        // Wrap around
        if (this.x < -this.length) this.x = width + this.length;
        if (this.x > width + this.length) this.x = -this.length;
        if (this.y < -this.length) this.y = height + this.length;
        if (this.y > height + this.length) this.y = -this.length;
      }

      draw() {
        const wave = Math.sin(time * this.waveFrequency + this.waveOffset) * this.waveAmplitude;
        const currentOpacity = this.opacity * (0.7 + Math.sin(time * 0.002 + this.waveOffset) * 0.3);

        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        
        // Curved line
        const endX = this.x + Math.cos(this.angle) * this.length;
        const endY = this.y + Math.sin(this.angle) * this.length;
        const midX = (this.x + endX) / 2 + Math.cos(this.angle + Math.PI/2) * wave;
        const midY = (this.y + endY) / 2 + Math.sin(this.angle + Math.PI/2) * wave;
        
        ctx.quadraticCurveTo(midX, midY, endX, endY);

        const gradient = ctx.createLinearGradient(this.x, this.y, endX, endY);
        gradient.addColorStop(0, `rgba(${config.goldColor.r}, ${config.goldColor.g}, ${config.goldColor.b}, 0)`);
        gradient.addColorStop(0.3, `rgba(${config.goldColor.r}, ${config.goldColor.g}, ${config.goldColor.b}, ${currentOpacity})`);
        gradient.addColorStop(0.7, `rgba(${config.goldColor.r}, ${config.goldColor.g}, ${config.goldColor.b}, ${currentOpacity})`);
        gradient.addColorStop(1, `rgba(${config.goldColor.r}, ${config.goldColor.g}, ${config.goldColor.b}, 0)`);

        ctx.strokeStyle = gradient;
        ctx.lineWidth = this.thickness;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }

    // Watermark logo
    function drawWatermark() {
      const centerX = width / 2;
      const centerY = height / 2;
      
      ctx.save();
      ctx.globalAlpha = 0.03 + Math.sin(time * 0.001) * 0.01;
      
      // Glow effect
      ctx.shadowColor = `rgba(${config.goldColor.r}, ${config.goldColor.g}, ${config.goldColor.b}, 0.5)`;
      ctx.shadowBlur = 100;
      
      ctx.font = '300 280px Georgia, serif';
      ctx.fillStyle = `rgba(${config.goldColor.r}, ${config.goldColor.g}, ${config.goldColor.b}, 0.8)`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('RL', centerX, centerY);
      
      ctx.restore();
    }

    // Vignette effect
    function drawVignette() {
      const gradient = ctx.createRadialGradient(
        width / 2, height / 2, height * 0.3,
        width / 2, height / 2, height * 0.9
      );
      gradient.addColorStop(0, 'rgba(10, 10, 10, 0)');
      gradient.addColorStop(1, 'rgba(10, 10, 10, 0.6)');
      
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
    }

    // Initialize particles
    function init() {
      particles = [];
      lightStreaks = [];
      
      for (let i = 0; i < config.particleCount; i++) {
        particles.push(new Particle());
      }
      
      for (let i = 0; i < config.lightStreakCount; i++) {
        lightStreaks.push(new LightStreak());
      }
    }

    // Animation loop
    function animate() {
      // Clear with dark background
      ctx.fillStyle = config.backgroundColor;
      ctx.fillRect(0, 0, width, height);

      // Add subtle gradient overlay
      const bgGradient = ctx.createRadialGradient(
        width / 2, height / 2, 0,
        width / 2, height / 2, Math.max(width, height) * 0.7
      );
      bgGradient.addColorStop(0, 'rgba(30, 25, 20, 0.3)');
      bgGradient.addColorStop(1, 'rgba(10, 10, 10, 0)');
      ctx.fillStyle = bgGradient;
      ctx.fillRect(0, 0, width, height);

      // Draw watermark
      drawWatermark();

      // Update and draw light streaks
      lightStreaks.forEach(streak => {
        streak.update();
        streak.draw();
      });

      // Update and draw particles
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });

      // Draw vignette
      drawVignette();

      time++;
      requestAnimationFrame(animate);
    }

    // Start animation
    init();
    animate();
  </script>
</body>
</html>
